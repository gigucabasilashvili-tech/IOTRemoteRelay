<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESP32 Relay Control</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <main class="card">
        <h1>Relay Control</h1>
        <p class="status-label">Current status</p>
        <p class="status-value {{STATE_CLASS}}">{{RELAY_STATE}}</p>
        <a href="?action=toggle" class="btn {{STATE_CLASS}}" aria-label="Toggle relay">
            Turn {{TOGGLE_LABEL}}
        </a>
        <p class="hint">Updates every 3 seconds</p>
    </main>
    <script>
        setTimeout(() => location.reload(), 3000);
    </script>
</body>
</html>
