<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESP32 Relay Control</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <main class="card">
        <h1>Relay Control</h1>
        <p class="status-label">Current status</p>
        <p class="status-value {{STATE_CLASS}}">{{RELAY_STATE}}</p>
        <button type="button" id="toggleBtn" class="btn {{STATE_CLASS}}" aria-label="Toggle relay">
            Turn {{TOGGLE_LABEL}}
        </button>
        <p class="hint">Status syncs every 3 seconds</p>
    </main>
    <script>
        const statusEl = document.querySelector('.status-value');
        const toggleBtn = document.getElementById('toggleBtn');

        function applyState(state) {
            const on = state.toUpperCase() === 'ON';
            statusEl.textContent = on ? 'ON' : 'OFF';
            statusEl.className = 'status-value ' + (on ? 'ON' : 'OFF');
            toggleBtn.className = 'btn ' + (on ? 'ON' : 'OFF');
            toggleBtn.textContent = 'Turn ' + (on ? 'OFF' : 'ON');
        }

        async function refreshStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                applyState(data.state);
            } catch (err) {
                console.error('Failed to refresh status', err);
            }
        }

        toggleBtn.addEventListener('click', async () => {
            try {
                const response = await fetch('/api/toggle', { method: 'POST' });
                const data = await response.json();
                applyState(data.state);
            } catch (err) {
                console.error('Failed to toggle relay', err);
            }
        });

        setInterval(refreshStatus, 3000);
    </script>
</body>
</html>
